name: Run Pytest

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main   # change if your default branch is different
    paths:
      - 'worlds/blueprince/**'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
        fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # match your project version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run pytest
        run: |
          pytest worlds/blueprince/test